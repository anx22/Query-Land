components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string

    SiteId:
      name: siteId
      in: path
      required: true
      schema:
        type: string
    DiscoveredUrlId:
      name: discoveredUrlId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ContentTerm:
      type: object
      required: [term, done]
      properties:
        term: { type: string }
        done: { type: boolean }
    ContentInternalLink:
      type: object
      required: [url, reason]
      properties:
        url: { type: string }
        anchor: { type: string, nullable: true }
        reason: { type: string }
    ContentRecommendation:
      type: object
      required: [id, projectId, siteId, url, title, intent, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        url: { type: string }
        opportunityId: { type: string, nullable: true }
        title: { type: string }
        targetTopic: { type: string }
        targetQueries:
          type: array
          items: { type: string }
        intent: { type: string, enum: [informational, commercial, transactional, navigational] }
        sections:
          type: array
          items: { type: string }
        terms:
          type: array
          items:
            $ref: '#/components/schemas/ContentTerm'
        internalLinks:
          type: array
          items:
            $ref: '#/components/schemas/ContentInternalLink'
        validationMetric: { type: string }
        status: { type: string, enum: [draft, ready, in_progress, done, dismissed] }
        notes: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateContentRecommendationRequest:
      type: object
      required: [url, title]
      properties:
        url: { type: string }
        title: { type: string }
        opportunityId: { type: string, nullable: true }
        targetTopic: { type: string }
        targetQueries:
          type: array
          items: { type: string }
        intent: { type: string, enum: [informational, commercial, transactional, navigational] }
        sections:
          type: array
          items: { type: string }
        terms:
          type: array
          items:
            $ref: '#/components/schemas/ContentTerm'
        internalLinks:
          type: array
          items:
            $ref: '#/components/schemas/ContentInternalLink'
        validationMetric: { type: string }
        notes: { type: string }
    PageMetric:
      type: object
      required: [url, metric, value, capturedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        url: { type: string }
        metric: { type: string, enum: [clicks, impressions, position, ctr] }
        value: { type: number }
        capturedAt: { type: string, format: date-time }
        sourceConfidence: { type: string }
    RefreshCandidate:
      type: object
      required: [url, clicksTrend, latestClicks, openIssues, refreshScore, reasons]
      properties:
        url: { type: string }
        clicksTrend: { type: number }
        latestClicks: { type: number }
        openIssues: { type: integer }
        refreshScore: { type: number }
        reasons:
          type: array
          items: { type: string }
    ContentScore:
      type: object
      required: [url, score, healthScore, openIssues, metricTrend, reasons]
      properties:
        url: { type: string }
        score: { type: number }
        healthScore: { type: number }
        openIssues: { type: integer }
        metricTrend: { type: number }
        reasons:
          type: array
          items: { type: string }
    Proposal:
      type: object
      required: [id, projectId, kind, title, body, status, source, createdAt, updatedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        kind: { type: string, enum: [dev_ticket, fix_pr] }
        title: { type: string }
        body: { type: string }
        opportunityId: { type: string, nullable: true }
        status: { type: string, enum: [proposed, accepted, rejected] }
        source: { type: string }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
            requestId: { type: string }
    AuthUser:
      type: object
      required: [id, email, name, role, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [owner, editor, viewer] }
        status: { type: string, enum: [active, disabled] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
        name: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    LoginResponse:
      type: object
      required: [user, token, expiresAt]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        token: { type: string }
        expiresAt: { type: string, format: date-time }
    Project:
      type: object
      required: [id, name, slug, status, defaultLocale, markets, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        defaultLocale: { type: string }
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Market:
      type: object
      required: [country, language, device, searchEngine]
      properties:
        country: { type: string }
        language: { type: string }
        device: { type: string, enum: [desktop, mobile] }
        searchEngine: { type: string, enum: [google, bing] }
    CreateProjectRequest:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [draft, active] }
        defaultLocale: { type: string }
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
    Site:
      type: object
      required: [id, projectId, scopeType, baseUrl, crawlFrequency, businessValue]
      properties:
        id: { type: string }
        projectId: { type: string }
        scopeType: { type: string, enum: [domain, subdomain, folder] }
        baseUrl: { type: string, format: uri }
        crawlFrequency: { type: string, enum: [manual, daily, weekly] }
        businessValue: { type: integer, minimum: 1, maximum: 100 }
    CreateSiteRequest:
      type: object
      required: [baseUrl, scopeType]
      properties:
        baseUrl: { type: string, format: uri }
        scopeType: { type: string, enum: [domain, subdomain, folder] }
        crawlFrequency: { type: string, enum: [manual, daily, weekly] }
        businessValue: { type: integer, minimum: 1, maximum: 100 }

    DiscoveredUrl:
      type: object
      required: [id, projectId, siteId, url, normalizedUrl, source, discoveredFrom, depth, discoveredAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        url: { type: string, format: uri }
        normalizedUrl: { type: string, format: uri }
        source: { type: string, enum: [seed, sitemap, link] }
        discoveredFrom: { type: string, format: uri, nullable: true }
        depth: { type: integer, minimum: 0 }
        discoveredAt: { type: string, format: date-time }
    RecordDiscoveredUrlsRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredUrl'
    RecordFetchResultRequest:
      type: object
      required: [url, finalUrl, statusCode, statusClass, headers, redirectChain, fetchedAt]
      properties:
        url: { type: string, format: uri }
        finalUrl: { type: string, format: uri }
        statusCode: { type: integer, nullable: true, minimum: 100, maximum: 599 }
        statusClass: { type: string, enum: [success, redirect, client_error, server_error, network_error] }
        headers:
          type: object
          additionalProperties: { type: string }
        redirectChain:
          type: array
          items: { type: string, format: uri }
        fetchedAt: { type: string, format: date-time }
        errorMessage: { type: string }
    UrlFetchRecord:
      allOf:
        - $ref: '#/components/schemas/RecordFetchResultRequest'
        - type: object
          required: [id, projectId, siteId, discoveredUrlId]
          properties:
            id: { type: string }
            projectId: { type: string }
            siteId: { type: string }
            discoveredUrlId: { type: string }

    RecordIndexabilityRequest:
      type: object
      required: [url, state, isIndexable, reasons, canonicalUrl, fetchResultId, assessedAt]
      properties:
        url: { type: string, format: uri }
        state: { type: string, enum: [indexable, blocked_by_status, blocked_by_meta, blocked_by_x_robots, blocked_by_robots, canonicalized] }
        isIndexable: { type: boolean }
        reasons:
          type: array
          items: { type: string }
        canonicalUrl: { type: string, format: uri, nullable: true }
        fetchResultId: { type: string, nullable: true }
        assessedAt: { type: string, format: date-time }
    IndexabilityRecord:
      allOf:
        - $ref: '#/components/schemas/RecordIndexabilityRequest'
        - type: object
          required: [id, projectId, siteId, discoveredUrlId]
          properties:
            id: { type: string }
            projectId: { type: string }
            siteId: { type: string }
            discoveredUrlId: { type: string }
    AuditIssueRecord:
      type: object
      required: [id, projectId, siteId, discoveredUrlId, url, rule, severity, message, detectedAt, resolvedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        discoveredUrlId: { type: string, nullable: true }
        url: { type: string, format: uri }
        rule: { type: string, enum: [http_error, redirect_chain, broken_link, missing_title, duplicate_title, title_too_long, title_too_short, canonical_mismatch, missing_canonical, missing_meta_description, duplicate_meta_description, meta_description_too_long, meta_description_too_short, missing_h1, multiple_h1, thin_content, image_missing_alt, missing_viewport, missing_html_lang, mixed_content, hreflang_invalid, structured_data_missing] }
        severity: { type: string, enum: [critical, high, medium, low] }
        message: { type: string }
        detectedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
        dismissedAt: { type: string, format: date-time, nullable: true }
        dismissReason: { type: string, nullable: true }
        lastActor: { type: string, nullable: true }
    AuditIssueHistoryEntry:
      type: object
      required: [id, projectId, siteId, issueId, action, actor, reason, createdAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        issueId: { type: string }
        action: { type: string, enum: [resolve, dismiss, reopen] }
        actor: { type: string }
        reason: { type: string, nullable: true }
        createdAt: { type: string, format: date-time }
    CrawlRunDiffIssue:
      type: object
      required: [id, url, rule, severity, message]
      properties:
        id: { type: string }
        url: { type: string, format: uri }
        rule: { type: string, enum: [http_error, redirect_chain, broken_link, missing_title, duplicate_title, title_too_long, title_too_short, canonical_mismatch, missing_canonical, missing_meta_description, duplicate_meta_description, meta_description_too_long, meta_description_too_short, missing_h1, multiple_h1, thin_content, image_missing_alt, missing_viewport, missing_html_lang, mixed_content, hreflang_invalid, structured_data_missing] }
        severity: { type: string, enum: [critical, high, medium, low] }
        message: { type: string }
    CrawlRunDiff:
      type: object
      required: [baseRunId, compareRunId, baseAsOf, compareAsOf, appearedIssues, fixedIssues, persistingCount, newUrls, deltas]
      properties:
        baseRunId:
          type: string
          description: The chronologically older run id.
        compareRunId:
          type: string
          description: The chronologically newer run id.
        baseAsOf:
          type: string
          format: date-time
          description: As-of time used for the base run (finishedAt, falling back to startedAt).
        compareAsOf:
          type: string
          format: date-time
          description: As-of time used for the compare run (finishedAt, falling back to startedAt).
        appearedIssues:
          type: array
          description: Issues open as of compare but not open as of base.
          items:
            $ref: '#/components/schemas/CrawlRunDiffIssue'
        fixedIssues:
          type: array
          description: Issues open as of base but not open as of compare.
          items:
            $ref: '#/components/schemas/CrawlRunDiffIssue'
        persistingCount:
          type: integer
          description: Count of issues open as of both runs.
        newUrls:
          type: array
          description: URLs whose discoveredAt is in (baseAsOf, compareAsOf].
          items:
            $ref: '#/components/schemas/DiscoveredUrl'
        deltas:
          type: object
          required: [healthScore, openIssues, discoveredUrls]
          description: Summary deltas (compare - base) taken from each run's summary field.
          properties:
            healthScore: { type: integer, nullable: true }
            openIssues: { type: integer }
            discoveredUrls: { type: integer }
    DismissAuditIssueRequest:
      type: object
      properties:
        reason:
          type: string
          description: Optional free-text reason captured for the dismissal.
    RecordAuditIssuesRequest:
      type: object
      required: [issues]
      properties:
        checkedDiscoveredUrlIds:
          type: array
          description: Discovered URL IDs actually checked in this crawl scope; only stale issues in this list may be resolved.
          items:
            type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/AuditIssueRecord'
    IntegrationAccount:
      type: object
      required: [id, projectId, provider, status, sourceConfidence]
      properties:
        id: { type: string }
        projectId: { type: string }
        provider: { type: string }
        status: { type: string, enum: [disconnected, pending, connected, degraded, error] }
        sourceConfidence: { type: string, enum: [A, B, C, D, E] }
        quotaRemaining: { type: integer, nullable: true }
        freshness: { type: string, format: date-time, nullable: true }
    ConnectorContract:
      type: object
      required: [provider, sourceType, sourceConfidence, authStatus, quota, freshness, capabilities]
      properties:
        provider: { type: string }
        sourceType: { type: string }
        sourceConfidence: { type: string, enum: [A, B, C, D, E] }
        authStatus: { type: string, enum: [connected, missing_credentials, expired, degraded] }
        quota:
          nullable: true
          type: object
          required: [used, limit]
          properties:
            used: { type: integer }
            limit: { type: integer }
            resetsAt: { type: string, format: date-time }
        freshness:
          type: object
          required: [lastSyncedAt, lastEvidenceAt]
          properties:
            lastSyncedAt: { type: string, format: date-time, nullable: true }
            lastEvidenceAt: { type: string, format: date-time, nullable: true }
        capabilities:
          type: array
          items: { type: string }
    IntegrationStatusView:
      allOf:
        - $ref: '#/components/schemas/IntegrationAccount'
        - type: object
          required: [contract, lastSyncedAt, lastEvidenceAt]
          properties:
            contract:
              nullable: true
              allOf:
                - $ref: '#/components/schemas/ConnectorContract'
            lastSyncedAt: { type: string, format: date-time, nullable: true }
            lastEvidenceAt: { type: string, format: date-time, nullable: true }
    ConnectorSyncResult:
      type: object
      required: [integration, outcome, rawEventId, normalizedMetricsInserted, contract]
      properties:
        integration:
          $ref: '#/components/schemas/IntegrationAccount'
        outcome: { type: string, enum: [ok, missing_credentials, quota_exceeded, expired, degraded] }
        rawEventId: { type: string, nullable: true }
        normalizedMetricsInserted: { type: integer }
        contract:
          $ref: '#/components/schemas/ConnectorContract'
        reason: { type: string }
    CreateIntegrationRequest:
      type: object
      required: [projectId, provider]
      properties:
        projectId: { type: string }
        provider: { type: string }
    FoundationJob:
      type: object
      required: [id, projectId, type, status, idempotencyKey, subject, payload, attempts, createdAt, updatedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        type: { type: string, enum: [connector_sync, crawl_seed, source_map_refresh, health_check] }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        idempotencyKey: { type: string }
        subject: { type: string }
        payload: { type: object, additionalProperties: true }
        attempts: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateJobRequest:
      type: object
      required: [projectId, type, subject]
      properties:
        projectId: { type: string }
        type: { type: string, enum: [connector_sync, crawl_seed, source_map_refresh, health_check] }
        subject: { type: string }
        payload: { type: object, additionalProperties: true }
    CompleteJobRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [succeeded, failed] }
        lastError: { type: string }
    SourceMapEntry:
      type: object
      required: [id, projectId, urlPattern, template, component, repoPath, confidence]
      properties:
        id: { type: string }
        projectId: { type: string }
        urlPattern: { type: string }
        template: { type: string }
        component: { type: string }
        repoPath: { type: string }
        confidence: { type: string, enum: [exact, manifest, heuristic, unknown] }
    HealthSnapshot:
      type: object
      required: [status, service, version, checkedAt, checks]
      properties:
        status: { type: string, enum: [ok, degraded] }
        service: { type: string }
        version: { type: string }
        checkedAt: { type: string, format: date-time }
        checks:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name: { type: string }
              status: { type: string, enum: [ok, warn, fail] }
              details: { type: string }
