# internal-api.yaml — Welle-1 Foundation Contract.
# Stabiler interner API-Contract; UI und Agent/MCP konsumieren denselben Kern (Master §2.9, §4.4).
# Wird pro Welle erweitert, keine Brüche außerhalb des jeweiligen Scopes (§12.3).
openapi: 3.1.0
info:
  title: Internal SEO OS API
  version: 0.2.0
servers:
  - url: http://localhost:4000
    description: Local Foundation API
paths:
  x-error-contract:
    description: All 4xx/5xx API responses use the ApiError schema with code, message, details and requestId.
    schema:
      $ref: '#/components/schemas/ApiError'
  /health:
    get:
      summary: Foundation health and observability snapshot
      operationId: getHealth
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /auth/register:
    post:
      summary: Register a local backend user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthUser'
  /auth/login:
    post:
      summary: Login with email and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Logout and invalidate bearer session token
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session invalidated
        '401':
          description: Missing, invalid or expired session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /auth/session:
    get:
      summary: Resolve bearer session token
      operationId: getSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Missing, invalid or expired session
  /projects:
    get:
      summary: List projects
      operationId: listProjects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
    post:
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
  /projects/{projectId}/sites:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      summary: List sites/scopes for a project
      operationId: listProjectSites
      responses:
        '200':
          description: Site list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
    post:
      summary: Create site/scope for a project
      operationId: createProjectSite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Site'

  /projects/{projectId}/sites/{siteId}/crawl-runs/schedule:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    post:
      summary: Create a crawl run and schedule its typed crawl_seed job
      operationId: scheduleCrawlSeedRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseUrl]
              properties:
                trigger: { type: string, enum: [manual, scheduled, deploy], default: manual }
                baseUrl: { type: string, format: uri }
                sitemapUrl: { type: string, format: uri }
      responses:
        '201':
          description: Crawl run and crawl_seed job scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      crawlRun: { type: object, additionalProperties: true }
                      job:
                        $ref: '#/components/schemas/FoundationJob'
                  idempotent: { type: boolean }

  /projects/{projectId}/sites/{siteId}/discovered-urls:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List discovered URLs for a site scope
      operationId: listDiscoveredUrls
      responses:
        '200':
          description: Discovered URL list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredUrl'
    post:
      summary: Record discovered crawl URLs for a site scope
      operationId: recordDiscoveredUrls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordDiscoveredUrlsRequest'
      responses:
        '201':
          description: Discovered URLs stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredUrl'
                  meta:
                    type: object
                    properties:
                      inserted: { type: integer }
                      updated: { type: integer }
  /projects/{projectId}/sites/{siteId}/discovered-urls/{discoveredUrlId}/fetch-results:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - $ref: '#/components/parameters/DiscoveredUrlId'
    get:
      summary: List fetch results for a discovered URL
      operationId: listFetchResults
      responses:
        '200':
          description: Fetch result list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UrlFetchRecord'
    post:
      summary: Record a normalized HTTP fetch result
      operationId: recordFetchResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordFetchResultRequest'
      responses:
        '201':
          description: Fetch result stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UrlFetchRecord'

  /projects/{projectId}/sites/{siteId}/discovered-urls/{discoveredUrlId}/indexability:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - $ref: '#/components/parameters/DiscoveredUrlId'
    get:
      summary: List indexability assessments for a discovered URL
      operationId: listIndexabilityAssessments
      responses:
        '200':
          description: Indexability assessment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IndexabilityRecord'
    post:
      summary: Record an indexability assessment
      operationId: recordIndexabilityAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordIndexabilityRequest'
      responses:
        '201':
          description: Indexability assessment stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IndexabilityRecord'
  /projects/{projectId}/sites/{siteId}/audit-issues:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List audit issues for a site scope
      operationId: listAuditIssues
      responses:
        '200':
          description: Audit issue list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditIssueRecord'
    post:
      summary: Record audit issues for a site scope
      operationId: recordAuditIssues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordAuditIssuesRequest'
      responses:
        '201':
          description: Audit issues stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditIssueRecord'
                  meta:
                    type: object
                    properties:
                      inserted: { type: integer }
                      updated: { type: integer }
  /projects/{projectId}/sites/{siteId}/audit-issues/{issueId}/resolve:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - name: issueId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Resolve an open audit issue
      operationId: resolveAuditIssue
      responses:
        '200':
          description: Audit issue resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuditIssueRecord'
  /projects/{projectId}/sites/{siteId}/audit-issues/{issueId}/dismiss:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - name: issueId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Dismiss an audit issue without waiting for crawler auto-resolution
      operationId: dismissAuditIssue
      responses:
        '200':
          description: Audit issue dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuditIssueRecord'
  /projects/{projectId}/sites/{siteId}/audit-issues/{issueId}/reopen:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - name: issueId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Reopen a resolved or dismissed audit issue
      operationId: reopenAuditIssue
      responses:
        '200':
          description: Audit issue reopened
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuditIssueRecord'
  /projects/{projectId}/sites/{siteId}/web-vitals:
    get:
      summary: List latest Core Web Vitals metrics for a site
      operationId: listSiteWebVitals
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest web vitals per metric
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        metric:
                          type: string
                        value:
                          type: number
                        measuredAt:
                          type: string
                        sourceConfidence:
                          type: string
        '404':
          description: Site not found
  /projects/{projectId}/opportunities:
    get:
      summary: List opportunities for a project (priority-ordered)
      operationId: listOpportunities
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Opportunity list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      summary: Create an opportunity (requires evidence of confidence class A-C)
      operationId: createOpportunity
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Opportunity created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: Missing fields or insufficient evidence
        '404':
          description: Project not found
  /opportunities/{opportunityId}:
    get:
      summary: Get a single opportunity with its evidence
      operationId: getOpportunity
      parameters:
        - name: opportunityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Opportunity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '404':
          description: Opportunity not found
  /opportunities/{opportunityId}/transition:
    post:
      summary: Transition an opportunity status along the lifecycle (§6.5)
      operationId: transitionOpportunity
      parameters:
        - name: opportunityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        '200':
          description: Updated opportunity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '409':
          description: Illegal status transition
        '404':
          description: Opportunity not found
  /projects/{projectId}/sites/{siteId}/opportunities/generate-indexability:
    post:
      summary: Generate technical_fix opportunities from current indexability blockers (§6.6)
      operationId: generateIndexabilityOpportunities
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Generation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '404':
          description: Site not found
  /opportunities/{opportunityId}/revalidate:
    post:
      summary: Re-check an implemented indexability fix and set validated or reopened (§6.5)
      operationId: revalidateOpportunity
      parameters:
        - name: opportunityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated opportunity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '409':
          description: Opportunity is not in a revalidatable state
        '404':
          description: Opportunity not found
  /integrations:
    get:
      summary: List integration accounts
      operationId: listIntegrations
      responses:
        '200':
          description: Integration list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IntegrationAccount'
    post:
      summary: Create integration account placeholder
      operationId: createIntegration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationRequest'
      responses:
        '201':
          description: Integration created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IntegrationAccount'
  /integrations/{integrationId}/sync:
    post:
      summary: Run a connector sync (fetch -> validate -> normalize) storing raw and normalized data separately
      operationId: runConnectorSync
      parameters:
        - name: integrationId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Connector sync result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      integration:
                        $ref: '#/components/schemas/IntegrationAccount'
                      rawEventId:
                        type: string
                      normalizedMetricsInserted:
                        type: integer
        '400':
          description: Provider has no implemented connector
        '404':
          description: Integration not found
  /jobs:
    get:
      summary: List foundation jobs
      operationId: listJobs
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FoundationJob'
    post:
      summary: Create idempotent foundation job
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FoundationJob'
        '200':
          description: Existing job returned by idempotency key
  /jobs/claim:
    post:
      summary: Claim the next queued foundation job
      operationId: claimJob
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                type: { type: string, enum: [connector_sync, crawl_seed, source_map_refresh, health_check] }
      responses:
        '200':
          description: Claimed job or null if queue is empty
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    oneOf:
                      - $ref: '#/components/schemas/FoundationJob'
                      - type: 'null'
  /jobs/{jobId}/complete:
    post:
      summary: Mark a claimed foundation job as completed
      operationId: completeJob
      parameters:
        - name: jobId
          in: path
          required: true
          schema: { type: string }
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteJobRequest'
      responses:
        '200':
          description: Completed job
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FoundationJob'
  /source-map:
    get:
      summary: List source map anchors
      operationId: listSourceMapEntries
      responses:
        '200':
          description: Source map entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SourceMapEntry'
    post:
      summary: Upsert a url->template->repo source map entry (§4.3)
      operationId: upsertSourceMapEntry
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Source map entry
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/SourceMapEntry'
        '400':
          description: Missing fields
        '404':
          description: Project not found
  /source-map/resolve:
    get:
      summary: Resolve the source anchor for a URL (exact or longest-prefix match)
      operationId: resolveSourceAnchor
      parameters:
        - name: url
          in: query
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Resolved anchor or null
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    nullable: true
  /projects/{projectId}/deploy-markers:
    get:
      summary: List deploy markers for a project
      operationId: listDeployMarkers
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Deploy markers
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      summary: Create a deploy marker (for crawl/GSC delta correlation, §4.3)
      operationId: createDeployMarker
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                commitSha:
                  type: string
      responses:
        '201':
          description: Deploy marker created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '404':
          description: Project not found
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string

    SiteId:
      name: siteId
      in: path
      required: true
      schema:
        type: string
    DiscoveredUrlId:
      name: discoveredUrlId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
            requestId: { type: string }
    AuthUser:
      type: object
      required: [id, email, name, role, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [owner, editor, viewer] }
        status: { type: string, enum: [active, disabled] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
        name: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    LoginResponse:
      type: object
      required: [user, token, expiresAt]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        token: { type: string }
        expiresAt: { type: string, format: date-time }
    Project:
      type: object
      required: [id, name, slug, status, defaultLocale, markets, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        defaultLocale: { type: string }
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Market:
      type: object
      required: [country, language, device, searchEngine]
      properties:
        country: { type: string }
        language: { type: string }
        device: { type: string, enum: [desktop, mobile] }
        searchEngine: { type: string, enum: [google, bing] }
    CreateProjectRequest:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [draft, active] }
        defaultLocale: { type: string }
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
    Site:
      type: object
      required: [id, projectId, scopeType, baseUrl, crawlFrequency, businessValue]
      properties:
        id: { type: string }
        projectId: { type: string }
        scopeType: { type: string, enum: [domain, subdomain, folder] }
        baseUrl: { type: string, format: uri }
        crawlFrequency: { type: string, enum: [manual, daily, weekly] }
        businessValue: { type: integer, minimum: 1, maximum: 100 }
    CreateSiteRequest:
      type: object
      required: [baseUrl, scopeType]
      properties:
        baseUrl: { type: string, format: uri }
        scopeType: { type: string, enum: [domain, subdomain, folder] }
        crawlFrequency: { type: string, enum: [manual, daily, weekly] }
        businessValue: { type: integer, minimum: 1, maximum: 100 }

    DiscoveredUrl:
      type: object
      required: [id, projectId, siteId, url, normalizedUrl, source, discoveredFrom, depth, discoveredAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        url: { type: string, format: uri }
        normalizedUrl: { type: string, format: uri }
        source: { type: string, enum: [seed, sitemap, link] }
        discoveredFrom: { type: string, format: uri, nullable: true }
        depth: { type: integer, minimum: 0 }
        discoveredAt: { type: string, format: date-time }
    RecordDiscoveredUrlsRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredUrl'
    RecordFetchResultRequest:
      type: object
      required: [url, finalUrl, statusCode, statusClass, headers, redirectChain, fetchedAt]
      properties:
        url: { type: string, format: uri }
        finalUrl: { type: string, format: uri }
        statusCode: { type: integer, nullable: true, minimum: 100, maximum: 599 }
        statusClass: { type: string, enum: [success, redirect, client_error, server_error, network_error] }
        headers:
          type: object
          additionalProperties: { type: string }
        redirectChain:
          type: array
          items: { type: string, format: uri }
        fetchedAt: { type: string, format: date-time }
        errorMessage: { type: string }
    UrlFetchRecord:
      allOf:
        - $ref: '#/components/schemas/RecordFetchResultRequest'
        - type: object
          required: [id, projectId, siteId, discoveredUrlId]
          properties:
            id: { type: string }
            projectId: { type: string }
            siteId: { type: string }
            discoveredUrlId: { type: string }

    RecordIndexabilityRequest:
      type: object
      required: [url, state, isIndexable, reasons, canonicalUrl, fetchResultId, assessedAt]
      properties:
        url: { type: string, format: uri }
        state: { type: string, enum: [indexable, blocked_by_status, blocked_by_meta, blocked_by_x_robots, blocked_by_robots, canonicalized] }
        isIndexable: { type: boolean }
        reasons:
          type: array
          items: { type: string }
        canonicalUrl: { type: string, format: uri, nullable: true }
        fetchResultId: { type: string, nullable: true }
        assessedAt: { type: string, format: date-time }
    IndexabilityRecord:
      allOf:
        - $ref: '#/components/schemas/RecordIndexabilityRequest'
        - type: object
          required: [id, projectId, siteId, discoveredUrlId]
          properties:
            id: { type: string }
            projectId: { type: string }
            siteId: { type: string }
            discoveredUrlId: { type: string }
    AuditIssueRecord:
      type: object
      required: [id, projectId, siteId, discoveredUrlId, url, rule, severity, message, detectedAt, resolvedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        discoveredUrlId: { type: string, nullable: true }
        url: { type: string, format: uri }
        rule: { type: string, enum: [http_error, redirect_chain, missing_title, duplicate_title, canonical_mismatch, broken_link] }
        severity: { type: string, enum: [critical, high, medium, low] }
        message: { type: string }
        detectedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
    RecordAuditIssuesRequest:
      type: object
      required: [issues]
      properties:
        checkedDiscoveredUrlIds:
          type: array
          description: Discovered URL IDs actually checked in this crawl scope; only stale issues in this list may be resolved.
          items:
            type: string
        issues:
          type: array
          items:
            $ref: '#/components/schemas/AuditIssueRecord'
    IntegrationAccount:
      type: object
      required: [id, projectId, provider, status, sourceConfidence]
      properties:
        id: { type: string }
        projectId: { type: string }
        provider: { type: string }
        status: { type: string, enum: [disconnected, pending, connected, degraded, error] }
        sourceConfidence: { type: string, enum: [A, B, C, D, E] }
        quotaRemaining: { type: integer, nullable: true }
        freshness: { type: string, format: date-time, nullable: true }
    CreateIntegrationRequest:
      type: object
      required: [projectId, provider]
      properties:
        projectId: { type: string }
        provider: { type: string }
    FoundationJob:
      type: object
      required: [id, projectId, type, status, idempotencyKey, subject, payload, attempts, createdAt, updatedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        type: { type: string, enum: [connector_sync, crawl_seed, source_map_refresh, health_check] }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        idempotencyKey: { type: string }
        subject: { type: string }
        payload: { type: object, additionalProperties: true }
        attempts: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateJobRequest:
      type: object
      required: [projectId, type, subject]
      properties:
        projectId: { type: string }
        type: { type: string, enum: [connector_sync, crawl_seed, source_map_refresh, health_check] }
        subject: { type: string }
        payload: { type: object, additionalProperties: true }
    CompleteJobRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [succeeded, failed] }
        lastError: { type: string }
    SourceMapEntry:
      type: object
      required: [id, projectId, urlPattern, template, component, repoPath, confidence]
      properties:
        id: { type: string }
        projectId: { type: string }
        urlPattern: { type: string }
        template: { type: string }
        component: { type: string }
        repoPath: { type: string }
        confidence: { type: string, enum: [exact, manifest, heuristic, unknown] }
    HealthSnapshot:
      type: object
      required: [status, service, version, checkedAt, checks]
      properties:
        status: { type: string, enum: [ok, degraded] }
        service: { type: string }
        version: { type: string }
        checkedAt: { type: string, format: date-time }
        checks:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name: { type: string }
              status: { type: string, enum: [ok, warn, fail] }
              details: { type: string }
