# internal-api.yaml — Welle-1 Foundation Contract.
# Stabiler interner API-Contract; UI und Agent/MCP konsumieren denselben Kern (Master §2.9, §4.4).
# Wird pro Welle erweitert, keine Brüche außerhalb des jeweiligen Scopes (§12.3).
openapi: 3.1.0
info:
  title: Internal SEO OS API
  version: 0.2.0
servers:
  - url: http://localhost:4000
    description: Local Foundation API
paths:
  x-error-contract:
    description: All 4xx/5xx API responses use the ApiError schema with code, message, details and requestId.
    schema:
      $ref: '#/components/schemas/ApiError'
  /health:
    get:
      summary: Foundation health and observability snapshot
      operationId: getHealth
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /auth/register:
    post:
      summary: Register a local backend user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthUser'
  /auth/login:
    post:
      summary: Login with email and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Logout and invalidate bearer session token
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session invalidated
        '401':
          description: Missing, invalid or expired session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /auth/session:
    get:
      summary: Resolve bearer session token
      operationId: getSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Missing, invalid or expired session
  /projects:
    get:
      summary: List projects
      operationId: listProjects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
    post:
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
  /projects/{projectId}/sites:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      summary: List sites/scopes for a project
      operationId: listProjectSites
      responses:
        '200':
          description: Site list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
    post:
      summary: Create site/scope for a project
      operationId: createProjectSite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Site'


  /projects/{projectId}/sites/{siteId}/crawl-runs:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List crawl runs for a site scope
      operationId: listCrawlRuns
      responses:
        '200':
          description: Crawl run list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrawlRun'
    post:
      summary: Create a crawl run for a site scope
      operationId: createCrawlRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateCrawlRunRequest'
      responses:
        '201':
          description: Crawl run created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CrawlRun'
  /projects/{projectId}/sites/{siteId}/crawl-runs/{crawlRunId}/complete:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - $ref: '#/components/parameters/CrawlRunId'
    post:
      summary: Complete a crawl run with the latest crawl artifact summary
      operationId: completeCrawlRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CompleteCrawlRunRequest'
      responses:
        '200':
          description: Crawl run completed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CrawlRun'
  /projects/{projectId}/sites/{siteId}/health-scores:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List crawl health score snapshots for a site scope
      operationId: listHealthScores
      responses:
        '200':
          description: Health score list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/CrawlHealthScore'
  /projects/{projectId}/sites/{siteId}/health-scores/compute:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    post:
      summary: Compute and persist the current crawl health score for a site scope
      operationId: computeHealthScore
      responses:
        '201':
          description: Health score computed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CrawlHealthScore'
  /projects/{projectId}/sites/{siteId}/audit-issues:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List crawl audit issues for a site scope
      operationId: listAuditIssues
      responses:
        '200':
          description: Audit issue list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditIssueRecord'
    post:
      summary: Record crawl audit issues for a site scope
      operationId: recordAuditIssues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordAuditIssuesRequest'
      responses:
        '201':
          description: Audit issues stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditIssueRecord'
                  meta:
                    type: object
                    properties:
                      inserted: { type: integer }
                      updated: { type: integer }
  /projects/{projectId}/sites/{siteId}/discovered-urls:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List discovered URLs for a site scope
      operationId: listDiscoveredUrls
      responses:
        '200':
          description: Discovered URL list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredUrl'
    post:
      summary: Record discovered crawl URLs for a site scope
      operationId: recordDiscoveredUrls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordDiscoveredUrlsRequest'
      responses:
        '201':
          description: Discovered URLs stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredUrl'
                  meta:
                    type: object
                    properties:
                      inserted: { type: integer }
                      updated: { type: integer }
  /projects/{projectId}/sites/{siteId}/discovered-urls/{discoveredUrlId}/fetch-results:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - $ref: '#/components/parameters/DiscoveredUrlId'
    get:
      summary: List fetch results for a discovered URL
      operationId: listFetchResults
      responses:
        '200':
          description: Fetch result list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UrlFetchRecord'
    post:
      summary: Record a normalized HTTP fetch result
      operationId: recordFetchResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordFetchResultRequest'
      responses:
        '201':
          description: Fetch result stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UrlFetchRecord'

  /projects/{projectId}/sites/{siteId}/discovered-urls/{discoveredUrlId}/indexability:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - $ref: '#/components/parameters/DiscoveredUrlId'
    get:
      summary: List indexability assessments for a discovered URL
      operationId: listIndexabilityAssessments
      responses:
        '200':
          description: Indexability assessment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IndexabilityRecord'
    post:
      summary: Record an indexability assessment
      operationId: recordIndexabilityAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordIndexabilityRequest'
      responses:
        '201':
          description: Indexability assessment stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IndexabilityRecord'
  /integrations:
    get:
      summary: List integration accounts
      operationId: listIntegrations
      responses:
        '200':
          description: Integration list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IntegrationAccount'
    post:
      summary: Create integration account placeholder
      operationId: createIntegration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateIntegrationRequest'
      responses:
        '201':
          description: Integration created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IntegrationAccount'
  /jobs:
    get:
      summary: List foundation jobs
      operationId: listJobs
      responses:
        '200':
          description: Job list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/FoundationJob'
    post:
      summary: Create idempotent foundation job
      operationId: createJob
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateJobRequest'
      responses:
        '201':
          description: Job created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/FoundationJob'
        '200':
          description: Existing job returned by idempotency key
  /source-map:
    get:
      summary: List source map anchors
      operationId: listSourceMapEntries
      responses:
        '200':
          description: Source map entries
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/SourceMapEntry'
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
  parameters:
    ProjectId:
      name: projectId
      in: path
      required: true
      schema:
        type: string

    SiteId:
      name: siteId
      in: path
      required: true
      schema:
        type: string
    DiscoveredUrlId:
      name: discoveredUrlId
      in: path
      required: true
      schema:
        type: string

    CrawlRunId:
      name: crawlRunId
      in: path
      required: true
      schema:
        type: string
  schemas:
    ApiError:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message, requestId]
          properties:
            code: { type: string }
            message: { type: string }
            details: {}
            requestId: { type: string }
    AuthUser:
      type: object
      required: [id, email, name, role, status, createdAt, updatedAt]
      properties:
        id: { type: string }
        email: { type: string, format: email }
        name: { type: string }
        role: { type: string, enum: [owner, editor, viewer] }
        status: { type: string, enum: [active, disabled] }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    RegisterRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string, minLength: 12 }
        name: { type: string }
    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email: { type: string, format: email }
        password: { type: string }
    LoginResponse:
      type: object
      required: [user, token, expiresAt]
      properties:
        user:
          $ref: '#/components/schemas/AuthUser'
        token: { type: string }
        expiresAt: { type: string, format: date-time }
    Project:
      type: object
      required: [id, name, slug, status, defaultLocale, markets, createdAt, updatedAt]
      properties:
        id: { type: string }
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [draft, active, archived] }
        defaultLocale: { type: string }
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    Market:
      type: object
      required: [country, language, device, searchEngine]
      properties:
        country: { type: string }
        language: { type: string }
        device: { type: string, enum: [desktop, mobile] }
        searchEngine: { type: string, enum: [google, bing] }
    CreateProjectRequest:
      type: object
      required: [name, slug]
      properties:
        name: { type: string }
        slug: { type: string }
        status: { type: string, enum: [draft, active] }
        defaultLocale: { type: string }
        markets:
          type: array
          items:
            $ref: '#/components/schemas/Market'
    Site:
      type: object
      required: [id, projectId, scopeType, baseUrl, crawlFrequency, businessValue]
      properties:
        id: { type: string }
        projectId: { type: string }
        scopeType: { type: string, enum: [domain, subdomain, folder] }
        baseUrl: { type: string, format: uri }
        crawlFrequency: { type: string, enum: [manual, daily, weekly] }
        businessValue: { type: integer, minimum: 1, maximum: 100 }
    CreateSiteRequest:
      type: object
      required: [baseUrl, scopeType]
      properties:
        baseUrl: { type: string, format: uri }
        scopeType: { type: string, enum: [domain, subdomain, folder] }
        crawlFrequency: { type: string, enum: [manual, daily, weekly] }
        businessValue: { type: integer, minimum: 1, maximum: 100 }


    CrawlRunSummary:
      type: object
      required: [discoveredUrls, fetchedUrls, indexabilityAssessments, openIssues, healthScore]
      properties:
        discoveredUrls: { type: integer, minimum: 0 }
        fetchedUrls: { type: integer, minimum: 0 }
        indexabilityAssessments: { type: integer, minimum: 0 }
        openIssues: { type: integer, minimum: 0 }
        healthScore: { type: integer, minimum: 0, maximum: 100, nullable: true }
    CrawlRun:
      type: object
      required: [id, projectId, siteId, status, trigger, startedAt, finishedAt, summary]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        status: { type: string, enum: [queued, running, succeeded, failed] }
        trigger: { type: string, enum: [manual, scheduled, deploy] }
        startedAt: { type: string, format: date-time }
        finishedAt: { type: string, format: date-time, nullable: true }
        summary:
          $ref: '#/components/schemas/CrawlRunSummary'
        errorMessage: { type: string }
    CreateCrawlRunRequest:
      type: object
      required: [trigger]
      properties:
        trigger: { type: string, enum: [manual, scheduled, deploy] }
    CompleteCrawlRunRequest:
      type: object
      required: [status]
      properties:
        status: { type: string, enum: [succeeded, failed] }
        errorMessage: { type: string }
    CrawlHealthScore:
      type: object
      required: [id, projectId, siteId, score, totalIssues, issueCounts, generatedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        score: { type: integer, minimum: 0, maximum: 100 }
        totalIssues: { type: integer, minimum: 0 }
        issueCounts:
          type: object
          required: [critical, high, medium, low]
          properties:
            critical: { type: integer, minimum: 0 }
            high: { type: integer, minimum: 0 }
            medium: { type: integer, minimum: 0 }
            low: { type: integer, minimum: 0 }
        generatedAt: { type: string, format: date-time }
    AuditIssueRecord:
      type: object
      required: [id, projectId, siteId, discoveredUrlId, url, rule, severity, message, detectedAt, resolvedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        discoveredUrlId: { type: string, nullable: true }
        url: { type: string, format: uri }
        rule: { type: string, enum: [http_error, redirect_chain, missing_title, duplicate_title, canonical_mismatch, broken_link] }
        severity: { type: string, enum: [critical, high, medium, low] }
        message: { type: string }
        detectedAt: { type: string, format: date-time }
        resolvedAt: { type: string, format: date-time, nullable: true }
    RecordAuditIssuesRequest:
      type: object
      required: [issues]
      properties:
        issues:
          type: array
          items:
            $ref: '#/components/schemas/AuditIssueRecord'
    DiscoveredUrl:
      type: object
      required: [id, projectId, siteId, url, normalizedUrl, source, discoveredFrom, depth, discoveredAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        siteId: { type: string }
        url: { type: string, format: uri }
        normalizedUrl: { type: string, format: uri }
        source: { type: string, enum: [seed, sitemap, link] }
        discoveredFrom: { type: string, format: uri, nullable: true }
        depth: { type: integer, minimum: 0 }
        discoveredAt: { type: string, format: date-time }
    RecordDiscoveredUrlsRequest:
      type: object
      required: [urls]
      properties:
        urls:
          type: array
          items:
            $ref: '#/components/schemas/DiscoveredUrl'
    RecordFetchResultRequest:
      type: object
      required: [url, finalUrl, statusCode, statusClass, headers, redirectChain, fetchedAt]
      properties:
        url: { type: string, format: uri }
        finalUrl: { type: string, format: uri }
        statusCode: { type: integer, nullable: true, minimum: 100, maximum: 599 }
        statusClass: { type: string, enum: [success, redirect, client_error, server_error, network_error] }
        headers:
          type: object
          additionalProperties: { type: string }
        redirectChain:
          type: array
          items: { type: string, format: uri }
        fetchedAt: { type: string, format: date-time }
        errorMessage: { type: string }
    UrlFetchRecord:
      allOf:
        - $ref: '#/components/schemas/RecordFetchResultRequest'
        - type: object
          required: [id, projectId, siteId, discoveredUrlId]
          properties:
            id: { type: string }
            projectId: { type: string }
            siteId: { type: string }
            discoveredUrlId: { type: string }

    RecordIndexabilityRequest:
      type: object
      required: [url, state, isIndexable, reasons, canonicalUrl, fetchResultId, assessedAt]
      properties:
        url: { type: string, format: uri }
        state: { type: string, enum: [indexable, blocked_by_status, blocked_by_meta, blocked_by_x_robots, canonicalized] }
        isIndexable: { type: boolean }
        reasons:
          type: array
          items: { type: string }
        canonicalUrl: { type: string, format: uri, nullable: true }
        fetchResultId: { type: string, nullable: true }
        assessedAt: { type: string, format: date-time }
    IndexabilityRecord:
      allOf:
        - $ref: '#/components/schemas/RecordIndexabilityRequest'
        - type: object
          required: [id, projectId, siteId, discoveredUrlId]
          properties:
            id: { type: string }
            projectId: { type: string }
            siteId: { type: string }
            discoveredUrlId: { type: string }
    IntegrationAccount:
      type: object
      required: [id, projectId, provider, status, sourceConfidence]
      properties:
        id: { type: string }
        projectId: { type: string }
        provider: { type: string }
        status: { type: string, enum: [disconnected, pending, connected, degraded, error] }
        sourceConfidence: { type: string, enum: [A, B, C, D, E] }
        quotaRemaining: { type: integer, nullable: true }
        freshness: { type: string, format: date-time, nullable: true }
    CreateIntegrationRequest:
      type: object
      required: [projectId, provider]
      properties:
        projectId: { type: string }
        provider: { type: string }
    FoundationJob:
      type: object
      required: [id, projectId, type, status, idempotencyKey, attempts, createdAt, updatedAt]
      properties:
        id: { type: string }
        projectId: { type: string }
        type: { type: string, enum: [connector_sync, crawl_seed, source_map_refresh, health_check] }
        status: { type: string, enum: [queued, running, succeeded, failed, cancelled] }
        idempotencyKey: { type: string }
        attempts: { type: integer }
        createdAt: { type: string, format: date-time }
        updatedAt: { type: string, format: date-time }
    CreateJobRequest:
      type: object
      required: [projectId, type, subject]
      properties:
        projectId: { type: string }
        type: { type: string, enum: [connector_sync, crawl_seed, source_map_refresh, health_check] }
        subject: { type: string }
    SourceMapEntry:
      type: object
      required: [id, projectId, urlPattern, template, component, repoPath, confidence]
      properties:
        id: { type: string }
        projectId: { type: string }
        urlPattern: { type: string }
        template: { type: string }
        component: { type: string }
        repoPath: { type: string }
        confidence: { type: string, enum: [exact, manifest, heuristic, unknown] }
    HealthSnapshot:
      type: object
      required: [status, service, version, checkedAt, checks]
      properties:
        status: { type: string, enum: [ok, degraded] }
        service: { type: string }
        version: { type: string }
        checkedAt: { type: string, format: date-time }
        checks:
          type: array
          items:
            type: object
            required: [name, status]
            properties:
              name: { type: string }
              status: { type: string, enum: [ok, warn, fail] }
              details: { type: string }
