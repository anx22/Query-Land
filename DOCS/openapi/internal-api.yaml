# internal-api.yaml — Welle-1 Foundation Contract.
# Stabiler interner API-Contract; UI und Agent/MCP konsumieren denselben Kern (Master §2.9, §4.4).
# Wird pro Welle erweitert, keine Brüche außerhalb des jeweiligen Scopes (§12.3).
openapi: 3.1.0
info:
  title: Internal SEO OS API
  version: 0.2.0
servers:
  - url: http://localhost:4000
    description: Local Foundation API
paths:
  x-error-contract:
    description: All 4xx/5xx API responses use the ApiError schema with code, message, details and requestId.
    schema:
      $ref: '#/components/schemas/ApiError'
  /health:
    get:
      summary: Foundation health and observability snapshot
      operationId: getHealth
      responses:
        '200':
          description: Service health
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/HealthSnapshot'
  /auth/register:
    post:
      summary: Register a local backend user
      operationId: registerUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: User registered
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuthUser'
  /auth/login:
    post:
      summary: Login with email and password
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: Login succeeded
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/LoginResponse'
        '401':
          description: Invalid credentials
  /auth/logout:
    post:
      summary: Logout and invalidate bearer session token
      operationId: logoutUser
      security:
        - bearerAuth: []
      responses:
        '204':
          description: Session invalidated
        '401':
          description: Missing, invalid or expired session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiError'
  /auth/session:
    get:
      summary: Resolve bearer session token
      operationId: getSession
      security:
        - bearerAuth: []
      responses:
        '200':
          description: Current user
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      user:
                        $ref: '#/components/schemas/AuthUser'
        '401':
          description: Missing, invalid or expired session
  /projects:
    get:
      summary: List projects
      operationId: listProjects
      responses:
        '200':
          description: Project list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Project'
    post:
      summary: Create project
      operationId: createProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateProjectRequest'
      responses:
        '201':
          description: Project created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Project'
  /projects/{projectId}/sites:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
    get:
      summary: List sites/scopes for a project
      operationId: listProjectSites
      responses:
        '200':
          description: Site list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Site'
    post:
      summary: Create site/scope for a project
      operationId: createProjectSite
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSiteRequest'
      responses:
        '201':
          description: Site created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/Site'

  /projects/{projectId}/sites/{siteId}/crawl-runs/schedule:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    post:
      summary: Create a crawl run and schedule its typed crawl_seed job
      operationId: scheduleCrawlSeedRun
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [baseUrl]
              properties:
                trigger: { type: string, enum: [manual, scheduled, deploy], default: manual }
                baseUrl: { type: string, format: uri }
                sitemapUrl: { type: string, format: uri }
      responses:
        '201':
          description: Crawl run and crawl_seed job scheduled
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      crawlRun: { type: object, additionalProperties: true }
                      job:
                        $ref: '#/components/schemas/FoundationJob'
                  idempotent: { type: boolean }

  /projects/{projectId}/sites/{siteId}/crawl-runs/diff:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: Diff two crawl runs (UX-6b) reconstructed from audit-issue/URL lifecycle fields
      description: >-
        Compares two crawl runs by their as-of time (finishedAt, falling back to startedAt).
        The open-issue set "as of" each run is reconstructed from the lifecycle fields
        (detectedAt/resolvedAt/dismissedAt). The runs are ordered chronologically, so the
        result is always a base->compare comparison where compare is the newer run,
        regardless of which id is passed as base/compare.
      operationId: diffCrawlRuns
      parameters:
        - name: base
          in: query
          required: true
          schema: { type: string }
          description: A crawl run id in this site scope.
        - name: compare
          in: query
          required: true
          schema: { type: string }
          description: Another crawl run id in this site scope.
      responses:
        '200':
          description: Crawl run diff
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/CrawlRunDiff'
        '400':
          description: Missing base or compare query parameter
        '404':
          description: base or compare run not found in this site scope

  /projects/{projectId}/sites/{siteId}/discovered-urls:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List discovered URLs for a site scope
      operationId: listDiscoveredUrls
      responses:
        '200':
          description: Discovered URL list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredUrl'
    post:
      summary: Record discovered crawl URLs for a site scope
      operationId: recordDiscoveredUrls
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordDiscoveredUrlsRequest'
      responses:
        '201':
          description: Discovered URLs stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/DiscoveredUrl'
                  meta:
                    type: object
                    properties:
                      inserted: { type: integer }
                      updated: { type: integer }
  /projects/{projectId}/sites/{siteId}/discovered-urls/{discoveredUrlId}/fetch-results:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - $ref: '#/components/parameters/DiscoveredUrlId'
    get:
      summary: List fetch results for a discovered URL
      operationId: listFetchResults
      responses:
        '200':
          description: Fetch result list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/UrlFetchRecord'
    post:
      summary: Record a normalized HTTP fetch result
      operationId: recordFetchResult
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordFetchResultRequest'
      responses:
        '201':
          description: Fetch result stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/UrlFetchRecord'

  /projects/{projectId}/sites/{siteId}/discovered-urls/{discoveredUrlId}/indexability:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - $ref: '#/components/parameters/DiscoveredUrlId'
    get:
      summary: List indexability assessments for a discovered URL
      operationId: listIndexabilityAssessments
      responses:
        '200':
          description: Indexability assessment list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/IndexabilityRecord'
    post:
      summary: Record an indexability assessment
      operationId: recordIndexabilityAssessment
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordIndexabilityRequest'
      responses:
        '201':
          description: Indexability assessment stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/IndexabilityRecord'
  /projects/{projectId}/sites/{siteId}/audit-issues:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
    get:
      summary: List audit issues for a site scope
      operationId: listAuditIssues
      responses:
        '200':
          description: Audit issue list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditIssueRecord'
    post:
      summary: Record audit issues for a site scope
      operationId: recordAuditIssues
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RecordAuditIssuesRequest'
      responses:
        '201':
          description: Audit issues stored
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditIssueRecord'
                  meta:
                    type: object
                    properties:
                      inserted: { type: integer }
                      updated: { type: integer }
  /projects/{projectId}/sites/{siteId}/audit-issues/{issueId}/resolve:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - name: issueId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Resolve an open audit issue
      operationId: resolveAuditIssue
      responses:
        '200':
          description: Audit issue resolved
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuditIssueRecord'
  /projects/{projectId}/sites/{siteId}/audit-issues/{issueId}/dismiss:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - name: issueId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Dismiss an audit issue without waiting for crawler auto-resolution
      operationId: dismissAuditIssue
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/DismissAuditIssueRequest'
      responses:
        '200':
          description: Audit issue dismissed
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuditIssueRecord'
  /projects/{projectId}/sites/{siteId}/audit-issues/{issueId}/reopen:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - name: issueId
        in: path
        required: true
        schema: { type: string }
    post:
      summary: Reopen a resolved or dismissed audit issue
      operationId: reopenAuditIssue
      responses:
        '200':
          description: Audit issue reopened
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    $ref: '#/components/schemas/AuditIssueRecord'
  /projects/{projectId}/sites/{siteId}/audit-issues/{issueId}/history:
    parameters:
      - $ref: '#/components/parameters/ProjectId'
      - $ref: '#/components/parameters/SiteId'
      - name: issueId
        in: path
        required: true
        schema: { type: string }
    get:
      summary: List the lifecycle history (status transitions) of an audit issue
      operationId: listAuditIssueHistory
      responses:
        '200':
          description: Audit issue lifecycle history, newest first
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/AuditIssueHistoryEntry'
  /projects/{projectId}/sites/{siteId}/web-vitals:
    get:
      summary: List latest Core Web Vitals metrics for a site
      operationId: listSiteWebVitals
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Latest web vitals per metric
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        metric:
                          type: string
                        value:
                          type: number
                        measuredAt:
                          type: string
                        sourceConfidence:
                          type: string
        '404':
          description: Site not found
  /projects/{projectId}/sites/{siteId}/search-performance/sync:
    post:
      summary: Sync GSC search-performance rows for a site (deterministic stub, class B)
      operationId: syncSearchPerformance
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '202':
          description: Search-performance batch persisted
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      inserted:
                        type: integer
                      capturedAt:
                        type: string
                      market:
                        type: string
        '404':
          description: Site not found
  /projects/{projectId}/sites/{siteId}/search-performance:
    get:
      summary: List the latest search-performance batch (query x page matrix)
      operationId: listSearchPerformance
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
        - name: limit
          in: query
          required: false
          schema:
            type: integer
        - name: cursor
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Latest search-performance rows
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        query:
                          type: string
                        pageUrl:
                          type: string
                        clicks:
                          type: integer
                        impressions:
                          type: integer
                        ctr:
                          type: number
                        position:
                          type: number
                        sourceConfidence:
                          type: string
                  meta:
                    type: object
        '404':
          description: Site not found
  /projects/{projectId}/sites/{siteId}/search-performance/intelligence:
    get:
      summary: Search-performance intelligence (striking distance, CTR gaps, cannibalization)
      operationId: searchPerformanceIntelligence
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Derived search-performance signals from the latest batch
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
                    properties:
                      capturedAt:
                        type: string
                        nullable: true
                      strikingDistance:
                        type: array
                        items:
                          type: object
                      ctrGaps:
                        type: array
                        items:
                          type: object
                      cannibalization:
                        type: array
                        items:
                          type: object
                      summary:
                        type: object
        '404':
          description: Site not found
  /projects/{projectId}/opportunities:
    get:
      summary: List opportunities for a project (priority-ordered)
      operationId: listOpportunities
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: status
          in: query
          required: false
          schema:
            type: string
        - name: type
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Opportunity list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      summary: Create an opportunity (requires evidence of confidence class A-C)
      operationId: createOpportunity
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Opportunity created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '400':
          description: Missing fields or insufficient evidence
        '404':
          description: Project not found
  /opportunities/{opportunityId}:
    get:
      summary: Get a single opportunity with its evidence
      operationId: getOpportunity
      parameters:
        - name: opportunityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Opportunity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '404':
          description: Opportunity not found
  /opportunities/{opportunityId}/transition:
    post:
      summary: Transition an opportunity status along the lifecycle (§6.5)
      operationId: transitionOpportunity
      parameters:
        - name: opportunityId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
      responses:
        '200':
          description: Updated opportunity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '409':
          description: Illegal status transition
        '404':
          description: Opportunity not found
  /projects/{projectId}/sites/{siteId}/opportunities/generate-indexability:
    post:
      summary: Generate technical_fix opportunities from current indexability blockers (§6.6)
      operationId: generateIndexabilityOpportunities
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Generation result
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '404':
          description: Site not found
  /projects/{projectId}/sites/{siteId}/opportunities/generate:
    post:
      summary: Generate all five hard opportunity classes in one idempotent run (§6.1)
      operationId: generateAllOpportunities
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: siteId
          in: path
          required: true
          schema:
            type: string
      responses:
        '201':
          description: Generation result across technical_fix, low_hanging_keyword, money_page, cannibalization and internal_link_gap
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '404':
          description: Site not found
  /opportunities/{opportunityId}/revalidate:
    post:
      summary: Re-check an implemented indexability fix and set validated or reopened (§6.5)
      operationId: revalidateOpportunity
      parameters:
        - name: opportunityId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Updated opportunity
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '409':
          description: Opportunity is not in a revalidatable state
        '404':
          description: Opportunity not found
  /projects/{projectId}/keyword-groups:
    get:
      summary: List keyword groups for a project
      operationId: listKeywordGroups
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Keyword groups
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      summary: Create a keyword group
      operationId: createKeywordGroup
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                name:
                  type: string
                topic:
                  type: string
      responses:
        '201':
          description: Keyword group created
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '409':
          description: Duplicate group name
  /projects/{projectId}/keywords:
    get:
      summary: List keywords (filter by groupId, intent, brand, market)
      operationId: listKeywords
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: intent
          in: query
          required: false
          schema:
            type: string
        - name: brand
          in: query
          required: false
          schema:
            type: string
      responses:
        '200':
          description: Keyword list
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      summary: Bulk add keywords (auto intent/brand/funnel classification)
      operationId: addKeywords
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
      responses:
        '201':
          description: Keywords added
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
  /projects/{projectId}/keywords/{keywordId}/map-url:
    post:
      summary: Map a keyword to a target URL
      operationId: mapKeywordToUrl
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: keywordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                targetUrl:
                  type: string
      responses:
        '200':
          description: Updated keyword
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: object
        '404':
          description: Keyword not found
  /projects/{projectId}/keywords/{keywordId}/rank-snapshots:
    get:
      summary: List rank snapshots (own position history) for a keyword
      operationId: listRankSnapshots
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: keywordId
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Rank snapshot history
          content:
            application/json:
              schema:
                type: object
                properties:
                  data:
                    type: array
                    items:
                      type: object
    post:
      summary: Record a rank/SERP snapshot via the SERP provider (stub, DEC-002)
      operationId: recordRankSnapshot
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: string
        - name: keywordId
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: false
        content:
          application/json:
            schema:
              type: object
              properties:
                market:
                  type: string
                device:
                  type: string
      responses:
        '201':
