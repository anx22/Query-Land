services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: seo_os
      POSTGRES_USER: seo
      POSTGRES_PASSWORD: seo
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U seo -d seo_os"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
